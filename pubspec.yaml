name: gyan_hub
description: "Gyan Hub — the friendly school store (mobile app)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing / state / networking
  go_router: ^16.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.0
  url_launcher: ^6.3.1

  # Push (optional at runtime — the app runs fine with no Firebase configured)
  firebase_core: ^4.4.0
  firebase_messaging: ^16.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

# Generates android/ios/web launcher icons from the brand logo.
# Run once after changing the source image: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "image.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "image.png"
    background_color: "#ffffff"
    theme_color: "#1e56a0"
