name: gyan_hub
description: "Gyan Hub — the friendly school store (mobile app)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing / state / networking
  go_router: ^16.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.0
  url_launcher: ^6.3.1

  # Push (optional at runtime — the app runs fine with no Firebase configured)
  firebase_core: ^4.4.0
  firebase_messaging: ^16.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
